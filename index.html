<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Kids Point — NPS Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0f11;--bg2:#18181c;--bg3:#222228;--border:rgba(255,255,255,0.08);--text:#f0f0f2;--muted:#7a7a85;--green:#3ecf8e;--green-bg:rgba(62,207,142,0.12);--amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);--red:#f87171;--red-bg:rgba(248,113,113,0.12);--blue:#60a5fa;--blue-bg:rgba(96,165,250,0.12);--radius:16px;--radius-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body{padding:0 0 env(safe-area-inset-bottom) 0}
.app{max-width:480px;margin:0 auto;padding:20px 16px 40px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:env(safe-area-inset-top)}
.logo-img{height:52px;object-fit:contain}
.live-dot{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);font-family:'DM Mono',monospace}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.tabs{display:flex;gap:6px;margin-bottom:20px;background:var(--bg2);border-radius:var(--radius-sm);padding:4px}
.tab{flex:1;text-align:center;padding:9px 6px;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;color:var(--muted);transition:all 0.2s;border:none;background:none}
.tab.active{background:var(--bg3);color:var(--text)}
.nps-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;margin-bottom:12px;text-align:center}
.nps-number{font-size:72px;font-weight:600;line-height:1;letter-spacing:-2px;font-family:'DM Mono',monospace}
.nps-label{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:0.05em;text-transform:uppercase}
.nps-zone{display:inline-block;margin-top:12px;font-size:12px;font-weight:500;padding:4px 12px;border-radius:99px}
.dist-bar{display:flex;height:6px;border-radius:99px;overflow:hidden;margin:16px 0 8px}
.dist-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:12px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center}
.metric-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
.metric-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin:20px 0 10px}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.chart-container{position:relative;width:100%;height:160px}
.comment-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 14px;margin-bottom:8px}
.comment-text{font-size:13px;line-height:1.55;color:var(--text);margin-bottom:5px}
.comment-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;font-family:'DM Mono',monospace}
.pill-det{background:var(--red-bg);color:var(--red)}
.pill-neu{background:var(--amber-bg);color:var(--amber)}
.pill-pro{background:var(--green-bg);color:var(--green)}
.pill-week{background:var(--blue-bg);color:var(--blue);font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.loading-ai{text-align:center;padding:16px;font-size:13px;color:var(--muted)}
.empty{text-align:center;padding:24px 16px;font-size:13px;color:var(--muted)}
.ai-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;background:var(--blue-bg);color:var(--blue);margin-left:6px;vertical-align:middle}
.week-label{font-size:11px;color:var(--blue);font-family:'DM Mono',monospace;margin-bottom:12px}
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.refresh-time{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.refresh-btn{font-size:12px;color:var(--green);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.week-group-title{font-size:11px;font-weight:600;color:var(--blue);margin:14px 0 6px;text-transform:uppercase;letter-spacing:0.05em}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
var APPS_URL='https://script.google.com/macros/s/AKfycbxoohk6VTw9AJXHAhK6vqbyQLqjafqqPN5pxVMXP2eA41z5WbUXTwy5IFG77S8uYGwv/exec';
var allData=[], currentTab='mes', barChartInst=null, weekDone=false;

function loadData(){
  document.getElementById('liveIndicator').innerHTML='<div class="dot" style="background:var(--amber)"></div><span style="color:var(--amber)">buscando</span>';
  fetch(APPS_URL)
    .then(function(r){return r.json();})
    .then(function(json){
      allData=parseRows(json);
      document.getElementById('liveIndicator').innerHTML='<div class="dot"></div><span style="color:var(--green)">ao vivo</span>';
      renderAll();
      updateTime();
    })
    .catch(function(){
      document.getElementById('liveIndicator').innerHTML='<div class="dot" style="background:var(--red)"></div><span style="color:var(--red)">erro</span>';
    });
}

function parseDate(str){
  if(!str) return new Date();
  var s=String(str).trim();
  var parts=s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  if(parts) return new Date(parts[3]+'-'+parts[2]+'-'+parts[1]);
  var d=new Date(s);
  return isNaN(d)?new Date():d;
}

function parseRows(rows){
  return rows.map(function(r){
    return{
      data:parseDate(r['Data']),
      nps:parseInt(r['NPS'])||0,
      atend:parseFloat(r['Atendimento'])||0,
      comida:parseFloat(r['Comida'])||0,
      limpeza:parseFloat(r['Limpeza'])||0,
      estrutura:parseFloat(r['Estrutura'])||0,
      comentario:r['Comentário']||'',
      nome:r['Nome']||''
    };
  }).filter(function(r){return r.nps>=0&&r.nps<=10;});
}

function getWeekRange(){
  var now=new Date();
  var dow=now.getDay();
  var dim=dow===0?6:dow-1;
  var mon=new Date(now); mon.setDate(now.getDate()-dim-7); mon.setHours(0,0,0,0);
  var sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return{mon:mon,sun:sun};
}

function getMesRange(){
  var now=new Date();
  return{
    start:new Date(now.getFullYear(),now.getMonth(),1,0,0,0,0),
    end:new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999)
  };
}

function filterWeek(){var wr=getWeekRange();return allData.filter(function(r){return r.data>=wr.mon&&r.data<=wr.sun;});}
function filterMes(){var mr=getMesRange();return allData.filter(function(r){return r.data>=mr.start&&r.data<=mr.end;});}
function avg(d,k){return d.length?d.reduce(function(s,r){return s+r[k];},0)/d.length:0;}
function fmtDate(d){return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('panelMes').style.display=tab==='mes'?'block':'none';
  document.getElementById('panelSemana').style.display=tab==='semana'?'block':'none';
  renderNPS();
  if(tab==='semana'&&!weekDone) runWeekAnalysis();
  if(tab==='mes') loadHistorico();
}

function renderAll(){
  renderNPS();
  if(currentTab==='semana'){weekDone=false;runWeekAnalysis();}
  else loadHistorico();
}

function renderNPS(){
  var d=currentTab==='mes'?filterMes():filterWeek();
  var n=d.length;
  var pro=d.filter(function(r){return r.nps>=9;}).length;
  var det=d.filter(function(r){return r.nps<=6;}).length;
  var neu=n-pro-det;
  var nps=n?Math.round(((pro-det)/n)*100):null;
  document.getElementById('npsperiodo').textContent=currentTab==='mes'?'este mês':'última semana';
  var color=nps===null?'var(--muted)':nps>=75?'var(--green)':nps>=50?'var(--blue)':nps>=0?'var(--amber)':'var(--red)';
  document.getElementById('npsNum').textContent=nps!==null?nps:'—';
  document.getElementById('npsNum').style.color=color;
  var zones=['Zona crítica','Zona de aperfeiçoamento','Zona de qualidade','Zona de excelência'];
  var zc=['var(--red-bg)','var(--amber-bg)','var(--blue-bg)','var(--green-bg)'];
  var zt=['var(--red)','var(--amber)','var(--blue)','var(--green)'];
  var zi=nps===null?-1:nps<0?0:nps<50?1:nps<75?2:3;
  if(zi>=0){var z=document.getElementById('npsZone');z.textContent=zones[zi];z.style.background=zc[zi];z.style.color=zt[zi];}
  var pP=n?Math.round(pro/n*100):0,pD=n?Math.round(det/n*100):0,pN=n?Math.round(neu/n*100):0;
  document.getElementById('distBar').innerHTML='<div style="width:'+pD+'%;background:var(--red)"></div><div style="width:'+pN+'%;background:var(--amber)"></div><div style="width:'+pP+'%;background:var(--green)"></div>';
  document.getElementById('mTotal').textContent=n;
  document.getElementById('mPro').textContent=pP+'%';
  document.getElementById('mDet').textContent=pD+'%';
  renderBar(d);
}

function renderBar(d){
  var ctx=document.getElementById('barChart').getContext('2d');
  if(barChartInst) barChartInst.destroy();
  barChartInst=new Chart(ctx,{type:'bar',data:{labels:['Atendimento','Comida','Limpeza','Estrutura'],datasets:[{label:'Média',data:[avg(d,'atend'),avg(d,'comida'),avg(d,'limpeza'),avg(d,'estrutura')].map(function(v){return parseFloat(v.toFixed(1));}),backgroundColor:['rgba(96,165,250,0.25)','rgba(62,207,142,0.25)','rgba(245,158,11,0.25)','rgba(248,113,113,0.25)'],borderColor:['#60a5fa','#3ecf8e','#f59e0b','#f87171'],borderWidth:1.5,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:5,ticks:{stepSize:1,color:'#7a7a85',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},x:{ticks:{color:'#7a7a85',font:{size:11}},grid:{display:false}}}}});
}

function makeCard(nps,comentario,nome,dataStr){
  var q=(comentario||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  var pilcls=nps<=6?'pill-det':nps<=8?'pill-neu':'pill-pro';
  return '<div class="comment-card"><div class="comment-text">"'+q+'"</div><div class="comment-meta"><span class="pill '+pilcls+'">NPS '+nps+'</span>'+(nome||'Anônimo')+' · '+dataStr+'</div></div>';
}

function runWeekAnalysis(){
  var dWeek=filterWeek();
  var wr=getWeekRange();
  var semLabel=fmtDate(wr.mon)+' a '+fmtDate(wr.sun);
  document.getElementById('weekRangeLabel').textContent=semLabel;
  var withC=dWeek.filter(function(r){return r.comentario&&r.comentario.trim().length>5;});
  if(!withC.length){document.getElementById('commentsWeek').innerHTML='<div class="empty">Sem comentários neste período.</div>';return;}
  document.getElementById('aiLoadingWeek').style.display='block';
  document.getElementById('commentsWeek').innerHTML='';
  analyzeInBatches(withC,0,[],semLabel);
}

function analyzeInBatches(items,offset,negIdx,semLabel){
  // Send all comments to Apps Script which calls Claude
  var comentarios=items.map(function(r){
    return{nps:r.nps,comentario:r.comentario};
  });
  fetch(APPS_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'analisarComentarios',comentarios:comentarios})
  }).then(function(r){return r.json();})
  .then(function(parsed){
    var negSet=new Set(parsed.negativos||[]);
    var negItems=items.filter(function(_,i){return negSet.has(i);});
    document.getElementById('aiLoadingWeek').style.display='none';
    if(negItems.length){
      document.getElementById('commentsWeek').innerHTML=negItems.map(function(r){return makeCard(r.nps,r.comentario,r.nome,r.data.toLocaleDateString('pt-BR'));}).join('');
      saveToHistorico(negItems,semLabel);
    }else{
      document.getElementById('commentsWeek').innerHTML='<div class="empty">Nenhum comentário negativo encontrado.</div>';
    }
    weekDone=true;
  }).catch(function(e){
    console.error('Erro IA:',e);
    var det=items.filter(function(r){return r.nps<=6;});
    document.getElementById('commentsWeek').innerHTML=det.length?det.map(function(r){return makeCard(r.nps,r.comentario,r.nome,r.data.toLocaleDateString('pt-BR'));}).join(''):'<div class="empty">Erro na análise. Sem comentários negativos por nota.</div>';
    document.getElementById('aiLoadingWeek').style.display='none';
    weekDone=true;
  });
}

function saveToHistorico(items,semana){
  var payload={
    action:'saveHistorico',
    semana:semana,
    comentarios:items.map(function(r){return{data:r.data.toLocaleDateString('pt-BR'),nps:r.nps,comentario:r.comentario,nome:r.nome};})
  };
  fetch(APPS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
}

function loadHistorico(){
  document.getElementById('aiLoadingMes').style.display='block';
  document.getElementById('commentsMes').innerHTML='';
  fetch(APPS_URL+'?sheet=Historico')
    .then(function(r){return r.json();})
    .then(function(json){
      var mr=getMesRange();
      var mesItems=json.filter(function(r){
        var d=parseDate(r['Data']);
        return d>=mr.start&&d<=mr.end;
      });
      if(!mesItems.length){
        document.getElementById('commentsMes').innerHTML='<div class="empty">Nenhum comentário negativo registrado ainda. Acesse a aba Última semana para gerar a análise.</div>';
      }else{
        var byWeek={};
        mesItems.forEach(function(r){var wk=r['Semana']||'';if(!byWeek[wk])byWeek[wk]=[];byWeek[wk].push(r);});
        var html='';
        Object.keys(byWeek).sort().reverse().forEach(function(wk){
          html+='<div class="week-group-title">Semana '+wk+'</div>';
          byWeek[wk].forEach(function(r){
            html+=makeCard(parseInt(r['NPS'])||0,r['Comentário'],r['Nome'],r['Data']);
          });
        });
        document.getElementById('commentsMes').innerHTML=html;
      }
      document.getElementById('aiLoadingMes').style.display='none';
    })
    .catch(function(){
      document.getElementById('commentsMes').innerHTML='<div class="empty">Erro ao carregar histórico.</div>';
      document.getElementById('aiLoadingMes').style.display='none';
    });
}

function updateTime(){
  var now=new Date();
  var wr=getWeekRange();
  document.getElementById('lastUpdate').textContent='Atualizado '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+' · sem. '+fmtDate(wr.mon)+' a '+fmtDate(wr.sun);
}

loadData();
setInterval(loadData,60000);
</script>
